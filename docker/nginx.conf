server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Disable browser caching during local development so JSON edits show up
  # immediately on reload. GitHub Pages will set its own cache headers in prod.
  add_header Cache-Control "no-store, no-cache, must-revalidate" always;

  # Serve JSON with the right content-type so fetch() / loader.js are happy.
  types {
    text/html       html;
    text/css        css;
    application/javascript js;
    application/json       json;
    image/svg+xml          svg;
    image/png              png;
    image/x-icon           ico;
  }

  location / {
    try_files $uri $uri/ =404;
  }

  # Hide repo internals when someone pokes around.
  location ~ /\.git { deny all; return 404; }
  location ~ /\.github { deny all; return 404; }
  location /docker/ { deny all; return 404; }
  location /scripts/ { deny all; return 404; }
}
