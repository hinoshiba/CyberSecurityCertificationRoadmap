services:
  # Authoring / evaluation container — has claude, codex, ajv, jq, gh, python.
  roadmap:
    build:
      context: ./docker
    image: cybersec-roadmap:dev
    working_dir: /work
    volumes:
      - .:/work
      - ${HOME}/.claude:/root/.claude:rw
      - ${HOME}/.claude.json:/root/.claude.json:rw
      - ${HOME}/.codex:/root/.codex:rw
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color

  # Static-site preview using nginx (mounts the repo read-only).
  preview:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
